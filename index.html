const g = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const GS = {S:5,A:4,B:3,C:2,D:1};
const GC = {S:'#f59e0b',A:'#3b82f6',B:'#10b981',C:'#f97316',D:'#ef4444'};

function calcScore(evObj, kpis, safetyKey) {
  let ws=0, wt=0;
  kpis.forEach(k=>{
    const gr=evObj?.['kpi_'+k.id];
    if(gr){ws+=GS[gr]*(k.weight/100);wt+=k.weight/100;}
  });
  if(!wt) return null;
  let score = Math.round((ws/5)*100);
  if(safetyKey && S.safetyData[safetyKey]){
    const sd=S.safetyData[safetyKey];
    const ded=(sd.ruleVio||0)*2+(sd.ltiCount||0)*5;
    score=Math.max(0,score-ded);
  }
  return score;
}
function getGrade(score){ if(score===null)return null; if(score>=90)return'S'; if(score>=75)return'A'; if(score>=60)return'B'; if(score>=45)return'C'; return'D'; }
function getCenterName(id){ return S.centers.find(c=>c.id===id)?.name||'-'; }
function getCenter(id){ return S.centers.find(c=>c.id===id); }
function deductInfo(key){ const sd=S.safetyData[key]; if(!sd||(sd.ruleVio===0&&sd.ltiCount===0)) return null; return `규정위반 ${sd.ruleVio}건(-${sd.ruleVio*2}점) + LTI ${sd.ltiCount}건(-${sd.ltiCount*5}점) = 총 -${sd.ruleVio*2+sd.ltiCount*5}점 감점`; }

function toast(msg, type='success'){
  const ic={success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'}[type]||'✅';
  const el=document.createElement('div'); el.className='tst '+(type==='error'?'err':type==='info'?'inf':type==='warn'?'wrn':'');
  el.innerHTML=`<span style="font-size:14px">${ic}</span><span>${esc(msg)}</span>`;
  g('toast').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(()=>el.remove(),300)},3000);
}

function closeModal(){ g('modalBg').classList.remove('open'); }

function fillLogin(email, pw){ g('loginEmail').value=email; g('loginPw').value=pw; }

function doLogin(){
  const email=g('loginEmail').value.trim(), pw=g('loginPw').value.trim();
  const err=g('loginErr'), btn=g('loginBtn');
  err.classList.remove('show');
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요';err.classList.add('show');return;}
  btn.disabled=true; btn.textContent='로그인 중...';
  if(DEMO_MODE){
    const u=DEMO_USERS[email];
    if(u&&u.pw===pw){
      S.user={email,...u};
      initDemoData(); showApp();
    } else {
      err.textContent='이메일 또는 비밀번호가 올바르지 않습니다'; err.classList.add('show');
    }
    btn.disabled=false; btn.textContent='로그인';
  }
}

function setGrade(ekey, kpiId, grade, btn){
  const isStf=ekey.startsWith('stf_');
  if(isStf){if(!S.staffEvals[ekey])S.staffEvals[ekey]={};S.staffEvals[ekey]['kpi_'+kpiId]=grade;}
  else{if(!S.mgrEvals[ekey])S.mgrEvals[ekey]={};S.mgrEvals[ekey]['kpi_'+kpiId]=grade;}
  btn.closest('.gbrow').querySelectorAll('.gbtn').forEach(b=>b.className='gbtn');
  btn.className='gbtn g'+grade;
  updateScoreDisplay(ekey, isStf?S.staffKPIs:S.mgrKPIs);
  saveLocal();
}
function updateScoreDisplay(ekey, kpis){
  const ev=ekey.startsWith('stf_')?S.staffEvals[ekey]:S.mgrEvals[ekey];
  const score=calcScore(ev,kpis,ekey); const fg=getGrade(score);
  const se=g('score_'+ekey),ge=g('grade_'+ekey),de=g('deduct_'+ekey);
  if(se)se.textContent=score!==null?score+'점':'—';
  if(ge){ge.textContent=fg||'—';ge.className='badge '+(fg?'b-'+fg:'b-none');}
  if(de){const di=deductInfo(ekey);if(di){de.innerHTML=`<strong>⚠ 안전 감점 적용</strong>${esc(di)}`;de.style.display='block';}else{de.style.display='none';}}
}

function pgFinalize(){
  const approved=S.managers.filter(m=>m.status==='approved');
  const evalDone=approved.filter(m=>{const ev=S.mgrEvals['mgr_'+m.id]||{};return S.mgrKPIs.every(k=>ev['kpi_'+k.id]);});
  const scores=approved.map(m=>calcScore(S.mgrEvals['mgr_'+m.id]||{},S.mgrKPIs,'mgr_'+m.id)).filter(s=>s!==null);
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const gd={S:0,A:0,B:0,C:0,D:0};
  scores.forEach(s=>{const gv=getGrade(s);if(gv)gd[gv]++;});
  const maxV=Math.max(...Object.values(gd),1);
  const bars=Object.entries(gd).map(([gv,v])=>`<div style="display:flex;flex-direction:column;align-items:center;gap:5px"><div style="font-size:12px;font-weight:700;color:#555">${v}명</div><div style="width:40px;height:${Math.round(v/maxV*70)+10}px;border-radius:5px 5px 0 0;background:${GC[gv]||'#ddd'}"></div><span class="badge b-${gv}">${gv}</span></div>`).join('');
  const checks=[
    ['평가지표 확정',S.mgrKPIs.length>0,`${S.mgrKPIs.length}개 항목`],
    ['평가 입력 완료',evalDone.length===approved.length,`${evalDone.length}/${approved.length}명`],
    ['실적 검토 완료',Object.keys(S.reviews).length>0,`${Object.values(S.reviews).filter(r=>r.status==='confirmed').length}건 확인`],
  ].map(([lbl,ok,nt])=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f5f5f5">
    <div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;background:${ok?'#d1fae5':'#fee2e2'};color:${ok?'#065f46':'#991b1b'}">${ok?'✓':'!'}</div>
    <div style="flex:1"><span style="font-weight:600">${lbl}</span> <span style="font-size:11px;color:#888">${nt}</span></div>
    <span class="badge ${ok?'b-green':'b-orange'}">${ok?'완료':'미완료'}</span></div>`).join('');
  return`<div class="ph"><div class="ptitle">분기 평가 완료 처리</div><div class="psub">2026년 상반기 평가를 최종 마감합니다</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px">
    <div class="sc"><div class="sn" style="color:#3b82f6">${approved.length}</div><div class="sl">총 센터장 수</div></div>
    <div class="sc"><div class="sn" style="color:#10b981">${evalDone.length}</div><div class="sl">평가 완료</div></div>
    <div class="sc"><div class="sn" style="color:#e91e8c">${avg}<span style="font-size:16px;color:#aaa">점</span></div><div class="sl">평균 점수</div></div>
  </div>
  <div class="card" style="margin-bottom:14px"><div class="sh"><div class="stit">등급 분포</div></div>
  <div style="padding:18px;display:flex;justify-content:center"><div style="display:flex;gap:16px;align-items:flex-end;height:110px">${bars}</div></div></div>
  <div class="card"><div class="sh"><div class="stit">마감 체크리스트</div></div>
  <div style="padding:14px 16px">${checks}

    <button class="btn btn-outline" onclick="exportResult()">📊 결과 내보내기</button>
    <button class="btn btn-pink" onclick="alert('최종 마감 처리되었습니다.')">🏁 최종 마감</button>
  </div></div></div>`;
}
function exportResult(){
  const lines=['서울6본부 OKR 평가 결과\n2026년 상반기\n\n이름\t센터\t규모\t종합점수\t등급\t규정위반\tLTI'];
  S.managers.filter(m=>m.status==='approved').forEach(m=>{
    const ekey='mgr_'+m.id; const c=getCenter(m.centerId);
    const score=calcScore(S.mgrEvals[ekey]||{},S.mgrKPIs,ekey);
    const sd=S.safetyData[ekey]||{ruleVio:0,ltiCount:0};
    lines.push([m.name,getCenterName(m.centerId),c?.scale==='large'?'대형':'중소형',score||'—',getGrade(score)||'—',sd.ruleVio||0,sd.ltiCount||0].join('\t'));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='서울6본부_OKR평가결과_2026상반기.txt';a.click();
}

function saveCenter(id){
  const nm=g('c_nm')?.value?.trim();if(!nm)return alert('센터명을 입력하세요');
  if(id){const c=S.centers.find(x=>x.id===id);if(c)Object.assign(c,{name:nm,scale:g('c_sc')?.value,type:g('c_tp')?.value});}
  else S.centers.push({id:Date.now(),name:nm,scale:g('c_sc')?.value,type:g('c_tp')?.value});
  toast('저장되었습니다');closeModal();render();
}
function delCenter(id){if(!confirm('삭제하시겠습니까?'))return;S.centers=S.centers.filter(c=>c.id!==id);toast('삭제','info');render();}
function modalViewPerf(staffId){
  const s=S.staff.find(x=>x.id===staffId);
  const perf=S.performances[staffId]||{};
  const agr=S.agreements[staffId]||{};
  const kpiRows=S.staffKPIs.map(k=>{const d=perf.kpiData?.[k.id]||{};return`<div style="border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;margin-bottom:4px">${esc(k.name)} <span style="font-weight:400;color:#aaa">(${k.weight}%)</span></div><div style="font-size:11px;color:#555">${esc(d.content||'(미입력)')}</div></div>`;}).join('');
  showModal(`<div class="mtitle">${esc(s.name)} 실적 내용</div>
  <div style="font-size:11px;color:#888;margin-bottom:12px">${esc(getCenterName(s.centerId))} · 제출일: ${perf.submittedAt||'—'}</div>
  ${kpiRows||'<div class="empty">제출된 실적이 없습니다</div>'}
  <div class="mfoot"><button class="btn btn-gray" onclick="closeModal()">닫기</button></div>`);
}

  const list=tab==='pending'?submitted:done;
  const rows=list.length?list.map(s=>{
    const perf=S.performances[s.id]||{};
    const agr=S.agreements[s.id]||{};
    return`<tr><td><div style="display:flex;align-items:center;gap:7px"><div class="av av-pk">${s.name[0]}</div>${esc(s.name)}</div></td>
    <td style="font-size:11px;color:#888">${perf.submittedAt||'—'}</td>

    <td style="font-size:11px;max-width:120px">${esc(agr.note||'')}</td>

      <button class="btn btn-outline btn-xs" onclick="modalViewPerfMgr(${s.id})">보기</button>
      ${tab==='pending'?`<button class="btn btn-green btn-xs" onclick="doAgree(${s.id},'agreed')" style="margin-left:4px">✓ 합의</button><button class="btn btn-red btn-xs" onclick="doAgree(${s.id},'rejected')" style="margin-left:4px">반려</button>`:''}
    </td></tr>`;

  return`<div class="ph"><div class="ptitle">합의 관리</div><div class="psub">센터원이 제출한 실적을 검토하고 합의 여부를 결정합니다</div></div>
  <div style="background:#e8f4fd;border:1px solid #bde0fe;border-radius:8px;padding:10px 14px;font-size:11px;color:#1e40af;margin-bottom:14px">
    📌 워크플로우: <strong>센터원 실적 제출</strong> → <strong>센터장 합의</strong> → <strong>본부장 확인</strong>
  </div>
  <div class="tabrow" style="margin-bottom:14px">
    <button class="tabbt${tab==='pending'?' active':''}" onclick="S.tab.agrTab='pending';render()">합의 대기 <span class="badge b-orange" style="margin-left:3px">${submitted.length}</span></button>
    <button class="tabbt${tab==='done'?' active':''}" onclick="S.tab.agrTab='done';render()">처리 완료 <span class="badge b-green" style="margin-left:3px">${done.length}</span></button>
  </div>
  <div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>이름</th><th>제출일</th><th>상태</th><th>의견</th><th>처리</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function doAgree(staffId,status){
  S.performances[staffId].status=status;
  S.agreements[staffId]={status:status==='agreed'?'approved':'rejected',note:'',date:new Date().toLocaleDateString('ko-KR'),managerId:S.user.managerId};
  saveLocal();toast(status==='agreed'?'합의 완료':'반려 처리',status==='agreed'?'success':'warn');render();
}
function modalViewPerfMgr(staffId){
  const s=S.staff.find(x=>x.id===staffId);
  const perf=S.performances[staffId]||{};
  const kpiRows=S.staffKPIs.map(k=>{const d=perf.kpiData?.[k.id]||{};return`<div style="border:1px solid #eee;border-radius:7px;padding:9px 11px;margin-bottom:7px"><div style="font-size:12px;font-weight:700;margin-bottom:3px">${esc(k.name)} <span style="font-weight:400;color:#aaa">(${k.weight}%)</span></div><div style="font-size:11px;color:#555">${esc(d.content||'(미입력)')}</div>${d.evidence?`<div style="font-size:10px;color:#888;margin-top:3px">📎 ${esc(d.evidence)}</div>`:''}</div>`;}).join('');
  showModal(`<div class="mtitle">${esc(s.name)} 실적 내용</div>
  <div style="font-size:11px;color:#888;margin-bottom:12px">제출일: ${perf.submittedAt||'—'}</div>
  ${kpiRows||'<div class="empty">제출 내용 없음</div>'}
  <div class="fg" style="margin-top:12px"><label class="fl">합의/반려 의견</label><input class="fi" id="agr_note" placeholder="의견 입력"></div>
  <div class="mfoot"><button class="btn btn-gray" onclick="closeModal()">닫기</button>
  <button class="btn btn-red btn-sm" onclick="doAgreeWithNote(${staffId},'rejected')">반려</button>
  <button class="btn btn-green btn-sm" onclick="doAgreeWithNote(${staffId},'agreed')">✓ 합의</button></div>`);
}
function doAgreeWithNote(staffId,status){
  S.performances[staffId]={...S.performances[staffId]||{},status};
  S.agreements[staffId]={status:status==='agreed'?'approved':'rejected',note:g('agr_note')?.value||'',date:new Date().toLocaleDateString('ko-KR'),managerId:S.user.managerId};
  saveLocal();toast(status==='agreed'?'합의 완료':'반려 처리',status==='agreed'?'success':'warn');closeModal();render();
}

function pgStaffEval(){
  const cid=S.user.centerId;
  const myStaff=S.staff.filter(s=>s.centerId===cid&&s.status==='approved');
  const hdr=S.staffKPIs.map(k=>`<th style="text-align:center;min-width:120px;font-size:10px">${esc(k.name)}<br><span style="font-weight:400;color:#aaa">${k.weight}%</span></th>`).join('');
  const rows=myStaff.map(s=>{
    const ekey='stf_'+s.id; const ev=S.staffEvals[ekey]||{};
    const score=calcScore(ev,S.staffKPIs,ekey); const fg=getGrade(score);
    const kpiCols=S.staffKPIs.map(k=>`<td><div class="gbrow" style="justify-content:center">${['S','A','B','C','D'].map(gr=>`<button class="gbtn${ev['kpi_'+k.id]===gr?' g'+gr:''}" onclick="setGrade('${ekey}',${k.id},'${gr}',this)">${gr}</button>`).join('')}</div></td>`).join('');
    return`<tr><td><div style="display:flex;align-items:center;gap:7px"><div class="av av-pk">${s.name[0]}</div><span style="font-weight:600">${esc(s.name)}</span></div></td>
    ${kpiCols}
    <td style="text-align:center"><span id="score_${ekey}" style="font-weight:700">${score!==null?score+'점':'—'}</span></td>
    <td style="text-align:center"><span id="grade_${ekey}" class="badge ${fg?'b-'+fg:'b-none'}">${fg||'—'}</span></td></tr>`;
  }).join('');
  return`<div class="ph"><div class="ptitle">센터원 평가</div><div class="psub">소속 센터원의 OKR 등급을 입력합니다</div></div>

}

function pgMyEval(){
  const m=S.managers.find(x=>x.id===S.user.managerId);
  if(!m) return`<div class="empty">센터장 정보를 찾을 수 없습니다</div>`;
  const ekey='mgr_'+m.id; const ev=S.mgrEvals[ekey]||{};
  const score=calcScore(ev,S.mgrKPIs,ekey); const fg=getGrade(score);
  const sd=S.safetyData[ekey]||{ruleVio:0,ltiCount:0};
  const ded=deductInfo(ekey);
  const kpiRows=S.mgrKPIs.map(k=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f5f5f5">
    <div><div style="font-size:13px;font-weight:600">${esc(k.name)}</div><div style="font-size:11px;color:#888">${esc(k.obj)} · ${k.weight}%</div></div>
    <span class="badge ${ev['kpi_'+k.id]?'b-'+ev['kpi_'+k.id]:'b-none'}" style="font-size:13px;padding:4px 12px">${ev['kpi_'+k.id]||'—'}</span>
  </div>`).join('');
  return`<div class="ph"><div class="ptitle">내 센터장 평가</div><div class="psub">본부장이 입력한 나의 OKR 평가 결과를 확인합니다</div></div>
  <div class="card">
    <div style="padding:18px 16px">
      <div style="display:flex;align-items:center;gap:16px;padding-bottom:16px;border-bottom:1px solid #f0f0f0;margin-bottom:16px">
        <div style="flex:1">
          <div style="font-size:22px;font-weight:700;color:#111">${score!==null?score+'점':'미평가'}</div>
          <div style="font-size:12px;color:#888">종합 점수</div>
        </div>
        <span class="badge ${fg?'b-'+fg:'b-none'}" style="font-size:20px;padding:10px 20px">${fg||'—'}</span>
      </div>
      ${kpiRows}
      ${ded?`<div class="ded-box" style="margin-top:12px"><strong>⚠ 안전 감점 적용</strong>${esc(ded)}</div>`:''}
      ${(sd.ruleVio||sd.ltiCount)?`<div style="margin-top:10px;font-size:11px;color:#555">규정위반 ${sd.ruleVio}건, LTI ${sd.ltiCount}건 기록됨</div>`:''}
    </div>
  </div>`;
}

function pgCenterRank(){
  const cid=S.user.centerId;
  const list=S.staff.filter(s=>s.centerId===cid&&s.status==='approved');
  const scored=list.map(s=>{const ekey='stf_'+s.id;return{...s,score:calcScore(S.staffEvals[ekey]||{},S.staffKPIs,ekey),grade:getGrade(calcScore(S.staffEvals[ekey]||{},S.staffKPIs,ekey))};}).sort((a,b)=>(b.score||0)-(a.score||0));
  const rows=scored.length?scored.map((s,i)=>{
    const rank=i+1;
    return`<tr><td><div class="rbox ${rank===1?'rk1':rank===2?'rk2':rank===3?'rk3':'rkn'}">${rank}</div></td>
    <td><div style="display:flex;align-items:center;gap:7px"><div class="av av-pk">${s.name[0]}</div><span style="font-weight:600">${esc(s.name)}</span></div></td>
    <td style="text-align:center;font-weight:700">${s.score!==null?s.score+'점':'—'}</td>
    <td style="text-align:center"><span class="badge ${s.grade?'b-'+s.grade:'b-none'}">${s.grade||'—'}</span></td></tr>`;
  }).join(''):`<tr><td colspan="4" class="empty">평가 데이터 없음</td></tr>`;
  return`<div class="ph"><div class="ptitle">센터원 순위 조회</div><div class="psub">소속 센터원 전체 OKR 순위 (센터장은 전체 공개)</div></div>
  <div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>순위</th><th>이름</th><th>종합 점수</th><th>등급</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ══════════════════════════════════════════
//  ③ 센터원 PAGES
// ══════════════════════════════════════════
function pgStaffDashboard(){
  const sid=S.user.staffId;
  const perf=S.performances[sid]||{};
  const agr=S.agreements[sid]||{};
  const rev=S.reviews[sid]||{};
  const ekey='stf_'+sid;
  const score=calcScore(S.staffEvals[ekey]||{},S.staffKPIs,ekey);
  const fg=getGrade(score);
  const statusMap={draft:'작성 중',submitted:'제출 완료',agreed:'센터장 합의',rejected:'반려',confirmed:'본부장 확인'};
  const stBadge=perf.status?`<span class="badge ${perf.status==='confirmed'?'b-blue':perf.status==='agreed'?'b-green':perf.status==='rejected'?'b-red':'b-pend'}">${statusMap[perf.status]||perf.status}</span>`:'<span class="badge b-gray">미제출</span>';
  return`<div class="ph"><div class="ptitle">환영합니다, ${esc(S.user.name)}님!</div>
  <div class="psub">센터원 대시보드 · 분기별 실적을 제출하고 본인의 순위를 확인할 수 있습니다</div></div>
  <div style="background:white;border:1px solid #eee;border-radius:12px;padding:16px 18px;margin-bottom:18px">
    <div style="font-size:12px;color:#888;margin-bottom:10px;font-weight:600">📌 실적 처리 현황</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      ${['제출','센터장 합의','본부장 확인'].map((step,i)=>{
        const done=[['submitted','agreed','confirmed','rejected'],['agreed','confirmed'],['confirmed']][i];
        const cur=[['submitted'],['agreed'],['confirmed']][i];
        const isDone=done.includes(perf.status);
        const isCur=cur.includes(perf.status);
        return`${i>0?'<span style="color:#ddd;font-size:12px">→</span>':''}
        <div style="display:flex;align-items:center;gap:4px;font-size:12px;color:${isCur?'#e91e8c':isDone?'#10b981':'#bbb'}">
          <div style="width:20px;height:20px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${isDone?'✓':i+1}</div>
          ${step}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:10px;font-size:12px">${stBadge}</div>
  </div>
  <div class="qg3">
    <div class="qc" onclick="go('my-submit')"><div class="qi ic-green">📋</div><h4>실적 제출</h4><p>분기별 실적 데이터 제출</p></div>
    <div class="qc" onclick="go('my-rank')"><div class="qi ic-orange">📊</div><h4>내 순위</h4><p>내 평가 순위 확인</p></div>
    <div class="sc" style="cursor:default"><div class="sn ${fg?'b-'+fg:''}" style="font-size:28px">${score!==null?score:'—'}<span style="font-size:14px;color:#aaa">${score!==null?'점':''}</span></div><div class="sl">내 종합 점수</div><span class="stag ${fg?'b-'+fg:'b-none'}">${fg||'미평가'}</span></div>
  </div>
  <div class="card"><div class="sh"><div class="stit">내 정보</div></div>
  <div style="padding:14px 16px"><table class="info-tbl">
    <tr><td>이름</td><td>${esc(S.user.name)}</td></tr>
    <tr><td>이메일</td><td>${esc(S.user.email)}</td></tr>
    <tr><td>직책</td><td>센터원</td></tr>
    <tr><td>소속</td><td>${esc(getCenterName(S.user.centerId))}</td></tr>
    <tr><td>가입일</td><td>${S.user.joinDate}</td></tr>
  </table></div></div>`;
}

function pgMySubmit(){
  const sid=S.user.staffId;
  const perf=S.performances[sid]||{kpiData:{},status:'draft'};
  const isSubmitted=['submitted','agreed','confirmed'].includes(perf.status);
  const isRejected=perf.status==='rejected';
  const statusInfo=isSubmitted&&!isRejected?`<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:10px 14px;font-size:12px;color:#065f46;margin-bottom:14px">✅ 제출 완료 (${perf.submittedAt}) — 현재 처리 중입니다</div>`:isRejected?`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:12px;color:#991b1b;margin-bottom:14px">❌ 반려 처리 — 내용 수정 후 재제출하세요</div>`:'';
  const kpiInputs=S.staffKPIs.map(k=>{
    const d=perf.kpiData?.[k.id]||{};
    return`<div class="perf-kpi">
    <div class="perf-kpi-head"><div><div class="perf-kpi-title">${esc(k.name)}</div><div class="perf-kpi-meta">${esc(k.obj)} · 가중치 ${k.weight}%</div></div></div>
    <div style="font-size:11px;color:#888;white-space:pre-line;margin-bottom:8px">${esc(k.criteria)}</div>
    <div class="fg"><label class="fl">실적 내용 *</label>
    <textarea class="fta" id="kpi_content_${k.id}" ${isSubmitted&&!isRejected?'disabled':''} placeholder="달성 내용을 구체적으로 입력하세요">${esc(d.content||'')}</textarea></div>
    <div class="fg"><label class="fl">증빙 자료</label>
    <input class="fi" id="kpi_ev_${k.id}" ${isSubmitted&&!isRejected?'disabled':''} placeholder="증빙 파일명 또는 URL" value="${esc(d.evidence||'')}"></div>
    </div>`;
  }).join('');
  return`<div class="ph"><div class="ptitle">실적 제출</div><div class="psub">각 OKR 항목별 실적을 입력하고 제출합니다</div></div>
  ${statusInfo}
  ${kpiInputs}
  ${!isSubmitted||isRejected?`<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px">
    <button class="btn btn-gray" onclick="saveDraft(${sid})">임시 저장</button>
    <button class="btn btn-pink" onclick="submitPerf(${sid})">📤 실적 제출</button>
  </div>`:''}`;
}
function saveDraft(sid){
  const kpiData={};
  S.staffKPIs.forEach(k=>{kpiData[k.id]={content:g('kpi_content_'+k.id)?.value||'',evidence:g('kpi_ev_'+k.id)?.value||''};});
  S.performances[sid]={...S.performances[sid]||{},kpiData,status:'draft'};
  saveLocal();toast('임시 저장되었습니다','info');
}
function submitPerf(sid){
  if(!confirm('실적을 제출하시겠습니까? 제출 후에는 센터장 합의 전까지 수정이 제한됩니다.'))return;
  const kpiData={};
  S.staffKPIs.forEach(k=>{kpiData[k.id]={content:g('kpi_content_'+k.id)?.value||'',evidence:g('kpi_ev_'+k.id)?.value||''};});
  S.performances[sid]={kpiData,status:'submitted',submittedAt:new Date().toLocaleDateString('ko-KR')};
  delete S.agreements[sid];
  saveLocal();toast('실적이 제출되었습니다');render();
}

function pgMyRank(){
  // 전체 순위 (익명 처리 - 본인만 이름 공개)
  const sid=S.user.staffId;
  const allApproved=S.staff.filter(s=>s.status==='approved');
  const scored=allApproved.map(s=>{
    const ekey='stf_'+s.id;
    return{id:s.id,name:s.name,centerId:s.centerId,isMe:s.id===sid,
      score:calcScore(S.staffEvals[ekey]||{},S.staffKPIs,ekey),
      grade:getGrade(calcScore(S.staffEvals[ekey]||{},S.staffKPIs,ekey))};
  }).sort((a,b)=>(b.score||0)-(a.score||0));

  const myRank=scored.findIndex(s=>s.isMe)+1;
  const me=scored.find(s=>s.isMe);

  const rows=scored.map((s,i)=>{
    const rank=i+1;
    const isMe=s.isMe;
    return`<tr class="${isMe?'own-row':''}">
    <td><div class="rbox ${rank===1?'rk1':rank===2?'rk2':rank===3?'rk3':'rkn'}">${rank}</div></td>
    <td>${isMe
      ?`<div style="display:flex;align-items:center;gap:7px"><div class="av av-pk">${s.name[0]}</div><span style="font-weight:700;color:#e91e8c">${esc(s.name)} 👈 나</span></div>`
      :`<div style="display:flex;align-items:center;gap:7px"><div class="av" style="background:#f3f4f6;color:#9ca3af">?</div><span style="color:#9ca3af">익 명</span></div>`
    }</td>
    <td style="font-size:11px;color:#888">${isMe?esc(getCenterName(s.centerId)):'—'}</td>
    <td style="text-align:center;font-weight:${isMe?'700':'400'};color:${isMe?'#111':'#9ca3af'}">${isMe&&s.score!==null?s.score+'점':'•'}</td>
    <td style="text-align:center"><span class="badge ${isMe&&s.grade?'b-'+s.grade:'b-none'}">${isMe&&s.grade?s.grade:'•'}</span></td>
    </tr>`;
  }).join('');

  return`<div class="ph"><div class="ptitle">내 순위</div><div class="psub">전체 센터원 기준 나의 위치 (타인 정보는 익명 처리됩니다)</div></div>
  <div style="background:linear-gradient(135deg,#fce7f3,white);border:1px solid #f9a8d4;border-radius:12px;padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px">
    <div style="text-align:center;min-width:80px">
      <div style="font-size:40px;font-weight:900;color:#e91e8c">${myRank}위</div>
      <div style="font-size:11px;color:#888">전체 ${scored.length}명 중</div>
    </div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:#111;margin-bottom:4px">${esc(S.user.name)}</div>
      <div style="font-size:13px;color:#555;margin-bottom:8px">${esc(getCenterName(S.user.centerId))}</div>
      <div style="display:flex;gap:10px">
        <span style="font-size:22px;font-weight:700;color:#111">${me?.score!==null?me?.score+'점':'—'}</span>
        <span class="badge ${me?.grade?'b-'+me?.grade:'b-none'}" style="font-size:14px;padding:5px 14px">${me?.grade||'미평가'}</span>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="sh"><div class="stit">전체 순위 (개인 정보 보호)</div><div class="ssub">본인 외 이름·점수·등급 비공개</div></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>순위</th><th>이름</th><th>소속</th><th>점수</th><th>등급</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

setTimeout(()=>{
  g('loadingScreen').classList.add('hide');
  g('loginScreen').classList.add('show');
}, 1200);
